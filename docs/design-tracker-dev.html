<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Design Tracker</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; background:#1e1f22; color:#e6e6e6;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.5; }
  a { color:#5aa6ff; text-decoration:none; } a:hover { text-decoration:underline; }
  .wrap { max-width:1200px; margin:0 auto; padding:22px 20px 64px; }
  .header { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  h1 { font-size:25px; margin:0; }
  .sub { color:#9aa0a6; font-size:13px; margin:2px 0 16px; }
  .sub a { color:#9aa0a6; text-decoration:underline; }
  .controls { display:flex; gap:8px; flex:0 0 auto; flex-wrap:wrap; align-items:center; }
  input, select, textarea, button { font-family:inherit; }
  #search, .flt { height:36px; padding:0 11px; font-size:13.5px; color:#e6e6e6; background:#2b2d31; border:1px solid #3a3c42; border-radius:9px; outline:none; }
  #search { width:200px; max-width:100%; }
  #search:focus, .flt:focus { border-color:#5aa6ff; }
  .btn { height:36px; padding:0 13px; font-size:13px; font-weight:600; color:#cdd2d8; background:#2b2d31; border:1px solid #3a3c42; border-radius:9px; cursor:pointer; }
  .btn:hover { border-color:#5aa6ff; color:#fff; }
  .btn-primary { background:#2684FF; color:#fff; border-color:#2684FF; }
  .btn-primary:hover { background:#1a6fe0; }
  /* tabs */
  .tabs { display:flex; gap:4px; margin:0 0 14px; border-bottom:1px solid #2b2d31; }
  .tab { appearance:none; background:none; border:none; border-bottom:2px solid transparent; color:#9aa0a6; font-size:14px; font-weight:600; padding:8px 14px 10px; cursor:pointer; margin-bottom:-1px; display:inline-flex; align-items:center; gap:7px; }
  .tab:hover { color:#cdd2d8; }
  .tab.active { color:#f0f1f3; border-bottom-color:#2684FF; }
  .tab .tcount { font-size:11px; font-weight:800; background:#2b2d31; color:#9aa0a6; border-radius:100px; padding:1px 8px; }
  .tab.active .tcount { background:#1f3a5f; color:#9ecbff; }
  /* list */
  .list { display:flex; flex-direction:column; gap:7px; }
  .lhead, .lrow { display:grid; gap:14px; align-items:center; }
  .lhead.v-ongoing, .lrow.v-ongoing { grid-template-columns:46px minmax(0,1fr) 132px 116px 64px 76px; }
  .lhead.v-final, .lrow.v-final { grid-template-columns:minmax(0,1fr) 150px 96px 64px 100px; }
  .lhead { padding:4px 14px 6px; font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:#7f868f; }
  .lhead .h-act { text-align:right; }
  .devlink { font-size:11.5px; font-weight:600; color:#5aa6ff; white-space:nowrap; }
  .devlink:hover { text-decoration:underline; }
  .nolink { color:#54595f; }
  .lhead .hf { display:inline-flex; align-items:center; gap:4px; cursor:pointer; border-radius:6px; padding:2px 6px; margin:-2px -6px; outline:none; user-select:none; }
  .lhead .hf:hover, .lhead .hf:focus-visible { background:#2b2d31; color:#cdd2d8; }
  .lhead .hf .ct { font-size:9px; opacity:.7; transition:transform .15s ease; }
  .lhead .hf.active { color:#7db2ff; }
  .lhead .hf.active .ct { opacity:1; }
  .lhead .hf .cnt { font-size:9px; font-weight:800; background:#2c456b; color:#bcd8ff; border-radius:8px; padding:0 5px; }
  /* filter popover */
  .fpop { position:fixed; z-index:55; display:none; min-width:170px; max-height:300px; overflow:auto;
    background:#1b1c1f; border:1px solid #3a3c42; border-radius:11px; padding:6px; box-shadow:0 12px 32px rgba(0,0,0,.5); }
  .fpop.open { display:block; }
  .fpop label { display:flex; align-items:center; gap:9px; padding:7px 9px; border-radius:8px; font-size:13px; color:#e6e6e6; cursor:pointer; text-transform:none; letter-spacing:0; font-weight:500; }
  .fpop label:hover { background:#26282c; }
  .fpop input { width:15px; height:15px; accent-color:#2684FF; cursor:pointer; }
  .fpop .fpop-clear { display:block; width:100%; text-align:left; padding:7px 9px; margin-top:2px; border-top:1px solid #2b2d31; background:none; border:none; color:#8a9098; font-size:12px; cursor:pointer; border-radius:0 0 8px 8px; }
  .fpop .fpop-clear:hover { color:#fff; }
  .lrow { background:#26282c; border:1px solid #34363b; border-radius:11px; padding:11px 14px; cursor:pointer; }
  .lrow:hover { border-color:#4a4d55; }
  .t-title { font-size:14px; font-weight:700; color:#f0f1f3; }
  .t-notes { font-size:12px; color:#8a9098; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .t-link { font-size:11px; color:#5aa6ff; margin-top:3px; display:inline-block; }
  .pri { display:inline-flex; align-items:center; justify-content:center; min-width:30px; height:22px; padding:0 6px; border-radius:6px; font-size:11px; font-weight:800; }
  .pri.P0 { background:#3a2122; color:#ff8a80; border:1px solid #5e2f30; }
  .pri.P1 { background:#3a3020; color:#ffc46b; border:1px solid #5e4d2a; }
  .pri.P2 { background:#1f2b3d; color:#7db2ff; border:1px solid #2c456b; }
  .pri.P3 { background:#2b2d31; color:#9aa0a6; border:1px solid #3a3c42; }
  .pri.none { color:#5a616a; font-weight:600; }
  .st { display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; color:#cdd2d8; }
  .st-dot { width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .chip { font-size:11px; font-weight:600; color:#cdd2d8; background:#2b2d31; border-radius:100px; padding:2px 9px; justify-self:start; }
  .ver { font-size:10.5px; font-weight:700; color:#9aa0a6; background:#2b2d31; border:1px solid #3a3c42; border-radius:5px; padding:0 6px; margin-left:6px; }
  .upd { font-size:11.5px; color:#9aa0a6; }
  .act { text-align:right; }
  .pushbtn { appearance:none; font-family:inherit; font-size:11.5px; font-weight:700; color:#9ecbff; background:#1f3a5f; border:1px solid #2c456b; border-radius:7px; padding:5px 10px; cursor:pointer; white-space:nowrap; }
  .pushbtn:hover { background:#2684FF; color:#fff; border-color:#2684FF; }
  .undobtn { appearance:none; font-family:inherit; font-size:11px; font-weight:600; color:#8a9098; background:none; border:1px solid #3a3c42; border-radius:7px; padding:5px 9px; cursor:pointer; white-space:nowrap; }
  .undobtn:hover { color:#cdd2d8; border-color:#4a4d55; }
  .lrow.v-final { border-left:3px solid #2f7d57; }
  .nores { display:none; color:#9aa0a6; padding:18px 4px; }
  /* editor drawer */
  .ov { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50; display:none; }
  .ov.open { display:block; }
  .drawer { position:fixed; top:0; right:0; bottom:0; width:min(440px,94vw); background:#1b1c1f; border-left:1px solid #34363b;
    z-index:51; transform:translateX(100%); transition:transform .24s ease; display:flex; flex-direction:column; box-shadow:-2px 0 26px rgba(0,0,0,.45); }
  .drawer.open { transform:translateX(0); }
  .drawer-head { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid #34363b; }
  .drawer-head strong { font-size:15px; }
  .drawer-body { overflow:auto; padding:16px 18px; flex:1; }
  .drawer-foot { display:flex; gap:10px; padding:14px 18px; border-top:1px solid #34363b; }
  .fld { margin-bottom:14px; }
  .fld label { display:block; font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:#8a9098; margin-bottom:6px; }
  .fld input, .fld select, .fld textarea { width:100%; padding:9px 11px; font-size:14px; color:#e6e6e6; background:#2b2d31; border:1px solid #3a3c42; border-radius:9px; outline:none; }
  .fld select { padding-right:30px; background-position:right 11px center; }
  .fld input:focus, .fld select:focus, .fld textarea:focus { border-color:#5aa6ff; }
  .fld textarea { min-height:150px; resize:vertical; line-height:1.5; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .x { cursor:pointer; background:none; border:none; color:#9aa0a6; font-size:22px; line-height:1; padding:2px 6px; border-radius:8px; }
  .x:hover { background:#2b2d31; color:#fff; }
  .del { margin-right:auto; color:#e08a8a; background:none; border:1px solid #4a3030; }
  .del:hover { background:#3a2626; color:#fff; border-color:#7a4040; }
  @media (max-width:820px){
    .lhead.v-ongoing, .lrow.v-ongoing { grid-template-columns:40px minmax(0,1fr) 72px; }
    .lhead.v-final, .lrow.v-final { grid-template-columns:minmax(0,1fr) 92px 92px; }
    .h-proj, .h-st, .h-dev, .c-proj, .st, .c-dev { display:none; }
  }
  /* chat assistant */
  .fab { position:fixed; right:24px; bottom:24px; z-index:60; width:56px; height:56px; border-radius:50%;
    background:#2684FF; color:#fff; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 22px rgba(0,0,0,.45); transition:transform .2s ease, background .2s ease; }
  .fab:hover { background:#1a6fe0; transform:translateY(-1px); }
  .fab svg { width:26px; height:26px; transition:transform .25s ease; }
  .fab.open svg { transform:rotate(45deg); }
  .chat { position:fixed; right:24px; bottom:92px; z-index:60; width:min(380px,calc(100vw - 32px)); height:min(540px,calc(100vh - 130px));
    background:#1b1c1f; border:1px solid #34363b; border-radius:16px; box-shadow:0 14px 40px rgba(0,0,0,.5);
    display:flex; flex-direction:column; overflow:hidden; opacity:0; transform:translateY(12px) scale(.98); pointer-events:none; transition:opacity .2s ease, transform .2s ease; }
  .chat.open { opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .chat-head { display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid #34363b; }
  .chat-head .dot { width:9px; height:9px; border-radius:50%; background:#37c97a; box-shadow:0 0 0 3px rgba(55,201,122,.18); }
  .chat-head strong { font-size:14.5px; letter-spacing:.2px; }
  .chat-msgs { flex:1; overflow:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:88%; font-size:13.5px; line-height:1.5; padding:9px 12px; border-radius:13px; word-wrap:break-word; }
  .msg.bot { align-self:flex-start; background:#26282c; border:1px solid #34363b; border-bottom-left-radius:4px; }
  .msg.me { align-self:flex-end; background:#2684FF; color:#fff; border-bottom-right-radius:4px; }
  .msg a { color:#5aa6ff; } .msg.me a { color:#dbe9ff; }
  .msg ul { margin:6px 0 2px; padding-left:18px; } .msg li { margin:2px 0; }
  .msg .mp { display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:18px; padding:0 5px; border-radius:5px; font-size:10px; font-weight:800; margin-right:4px; }
  .msg .mp.P0{background:#3a2122;color:#ff8a80} .msg .mp.P1{background:#3a3020;color:#ffc46b} .msg .mp.P2{background:#1f2b3d;color:#7db2ff} .msg .mp.P3{background:#2b2d31;color:#9aa0a6}
  .chips { display:flex; flex-wrap:wrap; gap:6px; padding:0 14px 10px; }
  .qchip { font-size:11.5px; color:#cdd2d8; background:#26282c; border:1px solid #34363b; border-radius:100px; padding:4px 10px; cursor:pointer; }
  .qchip:hover { border-color:#5aa6ff; color:#fff; }
  .chat-in { display:flex; gap:8px; padding:12px 14px; border-top:1px solid #34363b; align-items:flex-end; }
  .chat-in textarea { flex:1; min-height:40px; max-height:140px; padding:10px 13px; font-size:13.5px; line-height:1.4; color:#e6e6e6; background:#26282c; border:1px solid #34363b; border-radius:12px; outline:none; resize:none; overflow-y:auto; scrollbar-width:none; -ms-overflow-style:none; }
  .chat-in textarea::-webkit-scrollbar { display:none; }
  .chat-in textarea::placeholder { color:#6b7079; }
  .chat-in textarea:focus { border-color:#5aa6ff; }
  .chat-in button { height:40px; width:44px; flex:0 0 auto; border:none; border-radius:10px; background:#2684FF; color:#fff; cursor:pointer; }
  .chat-in button:hover { background:#1a6fe0; }
  /* dev preview banner (shows only on the *-dev / ?preview URL) */
  .devbar { display:none; background:#3a3020; color:#ffd591; border-bottom:1px solid #5e4d2a; text-align:center; font-size:12.5px; font-weight:600; padding:7px 14px; }
  .devbar.show { display:block; }
  .devbar a { color:#ffd591; text-decoration:underline; }
</style>
</head>
<body>
<div class="devbar" id="devbar">🔧 Dev preview — work in progress, not the live version. <a href="design-tracker.html">Open the live version →</a></div>
<div class="wrap">
  <div class="header">
    <h1 id="title">Design Tracker</h1>
    <div class="controls">
      <input id="search" type="search" autocomplete="off" spellcheck="false" placeholder="Search…">
    </div>
  </div>
  <div class="sub" id="sub">Your working list · edits save in this browser · <strong>Finalized</strong> = pushed to main.</div>

  <div class="tabs">
    <button class="tab active" data-view="ongoing">Ongoing <span class="tcount" id="cnt-ongoing"></span></button>
    <button class="tab" data-view="final">Finalized <span class="tcount" id="cnt-final"></span></button>
  </div>

  <div class="lhead v-ongoing" id="lhead"></div>
  <div class="list" id="list"></div>
  <div class="fpop" id="fpop"></div>
  <div class="nores" id="nores">No matching tasks.</div>
</div>

<!-- editor drawer -->
<div class="ov" id="ov"></div>
<aside class="drawer" id="drawer" role="dialog" aria-label="Task">
  <div class="drawer-head"><strong id="d-head">Task</strong><button class="x" id="d-close">&times;</button></div>
  <div class="drawer-body">
    <div class="fld"><label>Title</label><input id="f-item" type="text" placeholder="Task title"></div>
    <div class="row2">
      <div class="fld"><label>Status</label><select id="f-status"></select></div>
      <div class="fld"><label>Priority</label><select id="f-pri"><option value="">—</option><option>P0</option><option>P1</option><option>P2</option><option>P3</option></select></div>
    </div>
    <div class="row2">
      <div class="fld"><label>Project</label><input id="f-project" list="projlist" placeholder="e.g. Client-freelancer"></div>
      <div class="fld"><label>Version</label><input id="f-version" type="text" placeholder="v0.1"></div>
    </div>
    <div class="fld"><label>Link (Figma / preview / src)</label><input id="f-link" type="text" placeholder="https://…  or  [label](https://…)"></div>
    <div class="fld"><label>Notes</label><textarea id="f-notes" placeholder="Context, decisions, open questions, version log…"></textarea></div>
    <div class="fld" id="f-pushed-row" hidden><label>Pushed to main</label><input id="f-pushed" type="text" placeholder="YYYY-MM-DD" readonly></div>
    <datalist id="projlist"></datalist>
  </div>
  <div class="drawer-foot">
    <button class="btn del" id="d-del">Delete</button>
    <button class="btn" id="d-push">Push to main</button>
    <button class="btn btn-primary" id="d-save">Save</button>
  </div>
</aside>

<!-- chat assistant -->
<div class="chat" id="chat" role="dialog" aria-label="Tracker assistant">
  <div class="chat-head"><span class="dot"></span><strong>Tracker assistant</strong></div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chips" id="chat-chips">
    <span class="qchip" data-q="What's P0?">What's P0?</span>
    <span class="qchip" data-q="Summary">Summary</span>
    <span class="qchip" data-q="Finalized">Finalized</span>
    <span class="qchip" data-q="Hosted pages">Hosted pages</span>
    <span class="qchip" data-q="add ">+ Add a task</span>
  </div>
  <div class="chat-in">
    <textarea id="chat-input" rows="1" autocomplete="off" placeholder="Ask, or paste tasks to add…"></textarea>
    <button id="chat-send" aria-label="Send"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a1 1 0 0 0-1.39 1.18L4.3 11.5 12 12l-7.7.5-2.29 6.72A1 1 0 0 0 3.4 20.4z"/></svg></button>
  </div>
</div>
<button class="fab" id="fab" aria-label="Open assistant" title="Tracker assistant">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<script id="md" type="text/plain">
# Design Tracker

Two-tab design pipeline. **Ongoing** = work in progress (Status ∈ `Backlog` · `Upcoming` · `In design`). **Finalized** = pushed to main (the `Pushed` column records the date). Priority ∈ `P0` · `P1` · `P2` · `P3` (blank = none). Use **Push to main** on a task to finalize it.

| Item | Project | Status | Priority | Version | Pushed | Link | Notes |
|---|---|---|---|---|---|---|---|
| PLG loop — self-serve activation + paywall | Client-freelancer | Backlog | P0 | v0 |  |  | signup → add contractor → pay → upgrade |
| AI support widget ("Ask AI") | Wisemonk UI | Backlog | P0 | v0 |  |  | grounded in help/SCREENS, human fallback |
| Funnel analytics events | contractor-legal-ai | In design | P0 | v0.1 |  |  | Q3 M0 · signup→activate→pay→upgrade event spec |
| ICP-branched onboarding | Client-freelancer | Backlog | P1 | v0 |  |  | goal selector → tailored checklist/dashboard |
| Unified Admin Console | Admin-portal | Backlog | P1 | v0 |  |  | one shell over Form 16 / Notifications / Rules / Usage |
| Contractor onboarding · Get started | contractor-legal-ai | Upcoming | P1 | v1 |  | [src](https://github.com/AnjuChorotiya/contractor-legal-ai/blob/dev/frontend/src/app/onboarding/get-started/page.tsx) | on dev; merge dev→main to ship to prod |
| Workspace onboarding (5-step) | contractor-legal-ai | Upcoming | P1 | v1 |  | [src](https://github.com/AnjuChorotiya/contractor-legal-ai/blob/dev/frontend/src/app/onboarding/workspace/page.tsx) | on dev; not yet in prod |
| In-workflow testimonials | Client-freelancer | Backlog | P2 | v0 |  |  | capture after positive feedback |
| App shell (nav + header) | Wisemonk UI | In design |  | v1.3 | 2026-06-12 | [live](https://anjuchorotiya.github.io/Client-freelancer/wisemonk-ui/app-shell.html) | shipped · exact portal nav+header |
| Dev notes (annotations) | Wisemonk UI | In design |  | v1.5 | 2026-06-17 | [live](https://anjuchorotiya.github.io/Client-freelancer/wisemonk-ui/dev-notes.js) | shipped · drop-in on every project |
| Before/after-setup home + empty tabs | Client-freelancer | In design |  | v1 | 2026-06-17 | [live](https://anjuchorotiya.github.io/Client-freelancer/home.html?setup) | shipped · checklist, empty tabs, setup banner |
| EOR org + employee onboarding | wisemonk | In design |  | v1 | 2026-06-12 | [live](https://anjuchorotiya.github.io/wisemonk/) | shipped |
| contractor-legal-ai (app) | contractor-legal-ai | In design |  | v1 | 2026-06-28 | [live](https://legal.wisemonk.io) | shipped · live in production |
</script>

<script>
  const md = document.getElementById('md').textContent;
  const STORE = 'wm_design_tracker_v1';
  const STATUSES = ['Backlog','Upcoming','In design'];          // ongoing stages
  const STATUS_DOT = { 'Backlog':'#9aa0a6','Upcoming':'#f0b132','In design':'#5aa6ff' };
  const PRI_ORDER = { 'P0':0,'P1':1,'P2':2,'P3':3,'':9 };
  // map legacy statuses (from older saved boards) onto the new ongoing stages
  const LEGACY_STATUS = { 'To build':'Backlog','In review':'In design','Ready for handoff':'Upcoming','Hosted':'In design' };
  const listEl = document.getElementById('list');
  let tasks = [], wired = false, view = 'ongoing';

  function uid(){ return 't' + Math.random().toString(36).slice(2, 9); }
  function today(){ try { return new Date().toISOString().slice(0,10); } catch(e){ return ''; } }
  function esc(s){ return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function isFinal(t){ return !!t.pushedAt; }

  function parseSeed(text){
    const out = [];
    text.split(/\r?\n/).forEach(line => {
      line = line.trim();
      if (line[0] !== '|') return;
      const c = line.split('|').slice(1, -1).map(s => s.trim());
      if (c.length < 4 || /^:?-{2,}:?$/.test(c[0]) || c[0].toLowerCase() === 'item') return;
      let status = c[2]; if (LEGACY_STATUS[status]) status = LEGACY_STATUS[status];
      out.push({ id: uid(), item: c[0], project: c[1]||'', status: STATUSES.includes(status) ? status : 'Backlog',
        priority: ['P0','P1','P2','P3'].includes(c[3]) ? c[3] : '', version: c[4]||'', pushedAt: c[5]||'', link: c[6]||'', notes: c[7]||'' });
    });
    return out;
  }
  // Migrate a saved task from any older schema (updated→pushedAt, legacy statuses).
  function migrate(t){
    const o = { priority:'', ...t };
    if (o.pushedAt === undefined) o.pushedAt = (o.status === 'Hosted') ? (o.updated || today()) : '';
    if (LEGACY_STATUS[o.status]) o.status = LEGACY_STATUS[o.status];
    if (!STATUSES.includes(o.status)) o.status = 'Backlog';
    delete o.updated;
    return o;
  }
  function load(){
    try { const s = localStorage.getItem(STORE); if (s) return JSON.parse(s).map(migrate); } catch(e){}
    return parseSeed(md);
  }
  function persist(){ try { localStorage.setItem(STORE, JSON.stringify(tasks)); } catch(e){} }

  function linkHtml(cell){
    if (!cell) return '';

    return `<a class="t-link" href="${esc(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(m ? m[1] : 'open')} →</a>`;
  }
  function urlOf(cell){ if (!cell) return ''; const m = cell.match(/\[([^\]]+)\]\(([^)]+)\)/); return m ? m[2] : (/^https?:\/\//.test(cell) ? cell : ''); }
  function linkLabel(cell){ const m = (cell||'').match(/\[([^\]]+)\]\(([^)]+)\)/); return m ? m[1] : 'open'; }
  function devCell(t){ const url = urlOf(t.link); return `<span class="c-dev">${url ? `<a class="devlink" href="${esc(url)}" target="_blank" rel="noopener" title="${esc(url)}" onclick="event.stopPropagation()">${esc(linkLabel(t.link))} ↗</a>` : '<span class="nolink">—</span>'}</span>`; }

  function render(){ tasks = load(); if (!wired){ wireOnce(); wired = true; } draw(); }

  // Multi-select column filters (empty set = no filter on that column).
  const filt = { priority: new Set(), project: new Set(), status: new Set() };
  function taskVal(t, dim){ return dim === 'priority' ? (t.priority || '—') : (dim === 'project' ? (t.project || '—') : t.status); }

  function headerHtml(fin){
    if (fin) return `<span>Task</span>`
      + `<span class="hf h-proj" data-f="project" tabindex="0">Project<i class="ct">▾</i></span>`
      + `<span>Pushed</span><span class="h-dev">Live</span><span class="h-act"></span>`;
    return `<span class="hf" data-f="priority" tabindex="0">Pri<i class="ct">▾</i></span>`
      + `<span>Task</span>`
      + `<span class="hf h-proj" data-f="project" tabindex="0">Project<i class="ct">▾</i></span>`
      + `<span class="hf h-st" data-f="status" tabindex="0">Status<i class="ct">▾</i></span>`
      + `<span class="h-dev">Dev</span>`
      + `<span class="h-act">Push</span>`;
  }

  function draw(){
    const q = (document.getElementById('search').value || '').trim().toLowerCase();
    const fin = view === 'final';

    // keep the editor's project datalist current
    const projects = [...new Set(tasks.map(t => t.project).filter(Boolean))].sort();
    document.getElementById('projlist').innerHTML = projects.map(p => `<option value="${esc(p)}">`).join('');

    let rows = tasks.filter(t => fin ? isFinal(t) : !isFinal(t))
      .filter(t => (!filt.priority.size || filt.priority.has(t.priority || '—'))
        && (!filt.project.size || filt.project.has(t.project || '—'))
        && (fin || !filt.status.size || filt.status.has(t.status))
        && (!q || (t.item + ' ' + t.project + ' ' + t.notes).toLowerCase().includes(q)));
    rows = fin
      ? rows.sort((a,b) => (b.pushedAt || '').localeCompare(a.pushedAt || ''))
      : rows.sort((a,b) => (PRI_ORDER[a.priority] - PRI_ORDER[b.priority]) || (STATUSES.indexOf(a.status) - STATUSES.indexOf(b.status)));

    const lhead = document.getElementById('lhead');
    lhead.className = 'lhead ' + (fin ? 'v-final' : 'v-ongoing');
    lhead.innerHTML = headerHtml(fin);

    listEl.innerHTML = rows.map(t => rowHtml(t, fin)).join('');
    document.getElementById('nores').style.display = rows.length ? 'none' : 'block';
    document.getElementById('nores').textContent = fin ? 'Nothing pushed to main yet.' : 'No ongoing tasks match.';

    const onCount = tasks.filter(t => !isFinal(t)).length, finCount = tasks.filter(isFinal).length;
    document.getElementById('cnt-ongoing').textContent = onCount;
    document.getElementById('cnt-final').textContent = finCount;
    document.getElementById('sub').innerHTML = `${onCount} ongoing · ${finCount} finalized · edits save in this browser · <strong>Finalized</strong> = pushed to main.`;

    listEl.querySelectorAll('.lrow').forEach(r => r.addEventListener('click', e => { if (e.target.closest('[data-push],[data-unpush]')) return; openEditor(r.dataset.id); }));

    // reflect active filters on the (re-rendered) headers

      const n = filt[h.dataset.f].size;
      h.classList.toggle('active', n > 0);

  }

  // ---- column-header filter popover ----
  let openDim = null;
  function optionsFor(dim){
    const present = [...new Set(tasks.map(t => taskVal(t, dim)))];
    if (dim === 'priority') return present.sort((a,b) => PRI_ORDER[a === '—' ? '' : a] - PRI_ORDER[b === '—' ? '' : b]);
    if (dim === 'status') return present.sort((a,b) => STATUSES.indexOf(a) - STATUSES.indexOf(b));
    return present.sort();
  }
  function buildPop(dim){
    const labelOf = v => dim === 'priority' ? (v === '—' ? 'No priority' : v) : (dim === 'project' ? (v === '—' ? 'No project' : v) : v);

  // ---- push to main / finalize ----
  function pushToMain(id){ const t = tasks.find(x => x.id === id); if (!t) return; t.pushedAt = today(); persist(); draw(); }
  function unpush(id){ const t = tasks.find(x => x.id === id); if (!t) return; t.pushedAt = ''; persist(); draw(); }

  function rowHtml(t, fin){
    const titleCell = `<span><div class="t-title">${esc(t.item) || '(untitled)'}${t.version ? ` <span class="ver">${esc(t.version)}</span>` : ''}</div>${t.notes ? `<div class="t-notes">${esc(t.notes)}</div>` : ''}</span>`;

  // ---- editor ----

  function taskLi(t){ const tail = isFinal(t) ? `✅ pushed ${esc(t.pushedAt)}` : esc(t.status); return `<li>${priTag(t.priority)}<strong>${esc(t.item)}</strong>${t.project?` · ${esc(t.project)}`:''}${tail?` · ${tail}`:''}</li>`; }

  function parseAdd(text){
    let s = text.replace(/^\s*(add|new|create|\+|todo)\b[:\-]?\s*/i, '').trim();
    let priority = 'P2', project = '', status = 'Backlog';
    const pm = s.match(/\bP([0-3])\b/i); if (pm){ priority = 'P' + pm[1]; s = s.replace(pm[0], ' '); }
    STATUSES.forEach(st => { const re = new RegExp('\\b' + st.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&') + '\\b', 'i'); if (re.test(s)){ status = st; s = s.replace(re, ' '); } });
    const projects = [...new Set([...tasks.map(t => t.project), ...REPOS.map(r => r.name)].filter(Boolean))];
    projects.sort((a,b) => b.length - a.length).forEach(p => { const re = new RegExp('(?:\\bfor|\\bin|\\bto|\\bon)?\\s*\\b' + p.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&') + '\\b', 'i'); if (!project && re.test(s)){ project = p; s = s.replace(re, ' '); } });
    s = s.replace(/\b(task|for|to|in|on|priority|status|project)\b/gi, ' ').replace(/\s{2,}/g, ' ').replace(/^[\s:,\-]+|[\s:,\-]+$/g, '').trim();
    return { item: s, priority, project, status };
  }
  function cleanLine(line){
    // strip bullets / numbering / checkboxes that come with pasted lists
    return line.replace(/^\s*(?:[-*•·]|\d+[.)]|\[[ xX]?\])\s+/, '').trim();
  }
  function addTaskFromChat(text){
    const p = parseAdd(text);
    if (!p.item){ addMsg('bot', pick([
      `Happy to — what's the task? Something like <em>“add P0 redesign invoices for Client-freelancer”</em>.`,
      `Sure thing. Just tell me the title (and a priority/project if you like) and I'll add it.`
    ])); return; }
    const t = { id: uid(), item: p.item, project: p.project, status: p.status, priority: p.priority, version: 'v0', pushedAt: '', link: '', notes: '' };
    tasks.unshift(t); persist(); draw();
    addMsg('bot', `${pick(['Done!','Got it 👍','Added 👍','Nice, that\'s in.','On the board!'])} ${priTag(p.priority)}<strong>${esc(p.item)}</strong> → <strong>${esc(p.status)}</strong>${p.project?` · ${esc(p.project)}`:''}. <a href="#" data-edit="${t.id}">Open to edit ↗</a>`);
  }
  function deleteByName(text){
    const term = text.replace(/^\s*(delete|remove|drop)\b[:\-]?\s*/i, '').replace(/\btask\b/ig, '').trim().toLowerCase();
    if (!term) return addMsg('bot', 'Which task should I delete? Try <em>delete onboarding v2</em>.');
    const matches = tasks.filter(t => (t.item || '').toLowerCase().includes(term));
    if (!matches.length) return addMsg('bot', `Couldn't find a task matching “${esc(term)}”.`);
    if (matches.length > 1) return addMsg('bot', `That matches <strong>${matches.length}</strong> tasks — which one? Be more specific:<ul>${matches.map(taskLi).join('')}</ul>`);
    const t = matches[0];
    if (confirm('Delete "' + t.item + '"?')){ tasks = tasks.filter(x => x.id !== t.id); persist(); draw(); addMsg('bot', `${pick(['Gone.','Deleted 👍','Removed it.'])} <strong>${esc(t.item)}</strong> is off the board.`); }
    else addMsg('bot', 'Okay, kept it.');
  }
  function bulkAdd(text){
    const lines = text.split(/\r?\n/).map(cleanLine).filter(Boolean);
    if (!lines.length) return;
    if (lines.length === 1) return addTaskFromChat(lines[0]);
    const added = [];
    lines.forEach(line => {
      const p = parseAdd(line); if (!p.item) return;
      const t = { id: uid(), item: p.item, project: p.project, status: p.status, priority: p.priority, version: 'v0', pushedAt: '', link: '', notes: '' };
      tasks.unshift(t); added.push(t);
    });
    persist(); draw();
    const lead = pick([`Boom — added all <strong>${added.length}</strong>:`, `Done! Dropped <strong>${added.length}</strong> tasks on the board:`, `Got your list — <strong>${added.length}</strong> new tasks:`]);
    addMsg('bot', `${lead}<ul>${added.map(t => `<li>${priTag(t.priority)}${esc(t.item)}${t.project ? ` · ${esc(t.project)}` : ''} · ${esc(t.status)}</li>`).join('')}</ul>Click any row to fill in version, link or notes.`);
  }

  function summaryMsg(){
    const ongoing = tasks.filter(t => !isFinal(t)), finalized = tasks.filter(isFinal);
    const by = {}; STATUSES.forEach(s => by[s] = 0); ongoing.forEach(t => by[t.status] = (by[t.status]||0) + 1);
    const pri = { P0:0, P1:0, P2:0, P3:0 }; ongoing.forEach(t => { if (pri[t.priority] != null) pri[t.priority]++; });
    const lead = pick([`Here's where things stand:`, `Quick rundown:`, `Sure! Current state:`]);
    const tail = pri.P0 ? `<br>${pri.P0} ongoing ${pri.P0 === 1 ? 'item is' : 'items are'} ${priTag('P0')}— probably worth a look first.` : '';
    addMsg('bot', `${lead}<ul>${STATUSES.map(s => `<li>${s}: <strong>${by[s]}</strong></li>`).join('')}<li>✅ Finalized (pushed): <strong>${finalized.length}</strong></li></ul>Ongoing by priority: ${['P0','P1','P2','P3'].map(p => `${priTag(p)}${pri[p]}`).join('  ')}${tail}`);
  }
  function reposMsg(){
    addMsg('bot', `${pick(['Here are the hosted projects this tracker feeds into:', 'Sure — these are the live projects:', 'Here\'s everything that\'s hosted:'])}<ul>${REPOS.map(r => `<li><a href="${r.url}" target="_blank" rel="noopener">${esc(r.name)}</a> — ${esc(r.what)}</li>`).join('')}</ul>Want the full index? It's in the <a href="registry.html">registry</a>.`);
  }
  function noMatchMsg(){
    addMsg('bot', pick([
      `Hmm, I didn't quite catch that. I'm best at <em>adding tasks</em>, filtering by <em>priority / status / project</em>, a quick <em>summary</em>, or listing <em>hosted pages</em>. Want me to add it as a task? Start with <em>“add …”</em>.`,
      `Not sure on that one. Try a keyword, ask for a <em>summary</em>, or say <em>“add …”</em> to make it a task. Type <em>help</em> for the full list.`
    ]));
  }
  function smalltalk(low){
    if (/\b(hi|hii|hey|hello|yo|howdy)\b/.test(low)) return addMsg('bot', pick([`Hey! 👋 What are we working on?`, `Hi there — what can I help you track?`, `Hey hey! Ask me anything, or paste some tasks to add.`])), true;
    if (/\b(thanks|thank you|thx|ty|cheers|nice|great|awesome|perfect|cool)\b/.test(low)) return addMsg('bot', pick([`Anytime! 🙌`, `You got it.`, `Glad to help — what's next?`, `👍 Happy to.`])), true;
    if (/\b(bye|see ya|later|goodnight|good night)\b/.test(low)) return addMsg('bot', pick([`Catch you later! 👋`, `See ya — I'll keep the board warm.`])), true;
    if (/^\s*(ok|okay|k|got it|sounds good|alright)\s*$/.test(low)) return addMsg('bot', pick([`👍`, `Cool.`, `On it whenever you are.`])), true;
    return false;
  }

  function botRespond(text){
    const q = text.trim(); if (!q) return;
    const low = q.toLowerCase();
    if (/^(add|new|create|\+|todo)\b/i.test(q)) return addTaskFromChat(q);
    if (/^(delete|remove|drop)\b/i.test(q)) return deleteByName(q);
    if (/\b(help|what can you|how do|what do you)\b/.test(low))
      return addMsg('bot', `Happy to help! I keep tabs on everything in this tracker and the hosted repos. A few things you can ask:<ul><li><em>add P0 redesign invoices for Client-freelancer</em></li><li><strong>Paste a whole list</strong> (one task per line — Shift+Enter for a new line) and I'll create them all.</li><li><em>what's P0?</em> · <em>backlog</em> · <em>upcoming</em> · <em>in design</em> · <em>finalized</em></li><li><em>summary</em> · <em>hosted pages / links</em></li><li><em>delete onboarding v2</em> (remove a task) · <em>export</em> · <em>reset board</em></li><li>or just type a keyword and I'll dig up matching tasks.</li></ul>Tip: <strong>Push to main</strong> on a task finalizes it; the <strong>Finalized</strong> tab shows what's pushed and when.`);
    if (smalltalk(low)) return;
    if (/\b(export|download|backup|snapshot)\b/.test(low)){ exportMd(); return addMsg('bot', `On it — downloading a <strong>DESIGN-TRACKER.md</strong> snapshot. Commit or share that file to make your edits durable.`); }
    if (/\b(reset|restore|discard|revert)\b.*\b(board|edits|list|tracker|changes|everything)\b/.test(low) || /\breset (the )?board\b/.test(low)){
      if (confirm('Discard local edits and reload the published list?')){ try { localStorage.removeItem(STORE); } catch(e){} tasks = parseSeed(md); persist(); draw(); addMsg('bot', `Done — reloaded the published list and cleared local edits.`); }
      else addMsg('bot', `No worries, left everything as-is.`);
      return;
    }
    if (/\b(repo|repositor|hosted page|live (url|link|site)|links|pages|projects)\b/.test(low)) return reposMsg();
    if (/\b(summary|overview|how many|count|status|stats|where (are|do) (we|things))\b/.test(low)) return summaryMsg();
    if (/\b(finalized|finalised|pushed|shipped|done|live|hosted)\b/.test(low)) return listMsg('Finalized (pushed to main)', tasks.filter(isFinal));
    if (/\b(ongoing|in progress|wip|working on)\b/.test(low)) return listMsg('Ongoing', tasks.filter(t => !isFinal(t)));
    const pm = low.match(/\bp([0-3])\b/); if (pm) return listMsg('Priority P' + pm[1], tasks.filter(t => t.priority === 'P' + pm[1] && !isFinal(t)));
    for (const st of STATUSES){ if (low.includes(st.toLowerCase())) return listMsg(st, tasks.filter(t => t.status === st && !isFinal(t))); }
    const proj = [...new Set(tasks.map(t => t.project).filter(Boolean))].find(p => low.includes(p.toLowerCase()));
    if (proj) return listMsg(proj, tasks.filter(t => t.project === proj));
    const hits = tasks.filter(t => (t.item + ' ' + t.project + ' ' + t.notes).toLowerCase().includes(low));
    if (hits.length) return listMsg('“' + q + '”', hits);
    return noMatchMsg();
  }
  function growInput(){ const i = document.getElementById('chat-input'); i.style.height = 'auto'; i.style.height = Math.min(i.scrollHeight, 140) + 'px'; }
  function sendChat(){

  let chatGreeted = false;

    f.setAttribute('aria-label', open ? 'Close assistant' : 'Open assistant');
    if (open){
      if (!chatGreeted){ addMsg('bot', `Hey! 👋 I'm your tracker buddy — I've got the full picture on all <strong>${tasks.length}</strong> tasks and the hosted projects. Ask me what's P0, get a quick summary, or just paste a list and I'll add it. What's up?`); chatGreeted = true; }
      setTimeout(() => document.getElementById('chat-input').focus(), 200);
    }
  }

  function wireOnce(){
    document.getElementById('search').addEventListener('input', draw);
    // tabs: Ongoing / Finalized
    document.querySelector('.tabs').addEventListener('click', e => {
      const tab = e.target.closest('.tab'); if (!tab) return;
      view = tab.dataset.view;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
      filt.priority.clear(); filt.project.clear(); filt.status.clear(); closeFilter();
      draw();
    });
    // push / un-push (finalize) actions on rows
    listEl.addEventListener('click', e => {
      const p = e.target.closest('[data-push]'); if (p){ e.stopPropagation(); pushToMain(p.getAttribute('data-push')); return; }
      const u = e.target.closest('[data-unpush]'); if (u){ e.stopPropagation(); unpush(u.getAttribute('data-unpush')); }
    });
    // column-header multi-select filters
    document.querySelector('.lhead').addEventListener('click', e => { const hf = e.target.closest('.hf'); if (hf) openFilter(hf.dataset.f, hf); });
    document.querySelector('.lhead').addEventListener('keydown', e => { if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('hf')){ e.preventDefault(); openFilter(e.target.dataset.f, e.target); } });
    const pop = document.getElementById('fpop');
    pop.addEventListener('change', e => { if (!openDim || !e.target.matches('input[type=checkbox]')) return; const v = e.target.value; e.target.checked ? filt[openDim].add(v) : filt[openDim].delete(v); draw(); buildPop(openDim); });
    pop.addEventListener('click', e => { if (e.target.classList.contains('fpop-clear')){ filt[openDim].clear(); draw(); buildPop(openDim); } });
    document.addEventListener('click', e => { if (openDim && !e.target.closest('#fpop') && !e.target.closest('.hf')) closeFilter(); });
    window.addEventListener('resize', closeFilter);
    document.getElementById('fab').addEventListener('click', () => toggleChat());
    document.getElementById('chat-send').addEventListener('click', sendChat);
    document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendChat(); } });
    document.getElementById('chat-input').addEventListener('input', growInput);
    document.getElementById('chat-chips').addEventListener('click', e => {
      const q = e.target.getAttribute && e.target.getAttribute('data-q'); if (q == null) return;
      const inp = document.getElementById('chat-input');
      if (q.trim().toLowerCase() === 'add'){ inp.value = 'add '; inp.focus(); }
      else { addMsg('me', esc(q)); setTimeout(() => botRespond(q), 120); }
    });
    cmsgs().addEventListener('click', e => {
      const id = e.target.getAttribute && e.target.getAttribute('data-edit');
      if (id){ e.preventDefault(); toggleChat(false); openEditor(id); }
    });
    document.getElementById('d-close').addEventListener('click', closeEditor);
    document.getElementById('ov').addEventListener('click', closeEditor);
    document.getElementById('d-save').addEventListener('click', saveEditor);
    document.getElementById('d-del').addEventListener('click', deleteEditor);
    document.getElementById('d-push').addEventListener('click', pushEditor);
    document.addEventListener('keydown', e => { if (e.key === 'Escape'){ closeEditor(); toggleChat(false); closeFilter(); } });
  }

  // Show the dev-preview banner only when viewing the *-dev file or with ?preview/?dev.
  if (/-dev(\.html)?$/.test(location.pathname.toLowerCase()) || /[?&](dev|preview)\b/.test(location.search.toLowerCase())) {
    var _db = document.getElementById('devbar'); if (_db) _db.classList.add('show');
  }
  if (document.getElementById("md")) render();
</script>
</body>
</html>
