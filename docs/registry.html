<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hosted Pages Registry</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; background:#1e1f22; color:#e6e6e6;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6; }
  .wrap { max-width:980px; margin:0 auto; padding:32px 28px 80px; }
  h1 { font-size:30px; margin:0 0 8px; }
  h2 { font-size:21px; margin:34px 0 6px; padding-top:14px; border-top:1px solid #34363b; }
  a { color:#5aa6ff; text-decoration:none; } a:hover { text-decoration:underline; }
  code { background:#2b2d31; padding:2px 6px; border-radius:5px; font-size:90%;
    font-family:"Cascadia Code",Consolas,monospace; }
  blockquote { margin:14px 0; padding:10px 16px; border-left:3px solid #4b4d52;
    background:#26282c; color:#b9bcc2; border-radius:0 8px 8px 0; }
  table { border-collapse:collapse; width:100%; margin:10px 0 4px; font-size:14px; }
  th,td { border:1px solid #34363b; padding:9px 12px; text-align:left; }
  th { background:#26282c; }
  tr:nth-child(even) td { background:#232427; }
  .meta { color:#9aa0a6; font-size:13px; margin-top:24px; }
  .header { position:sticky; top:0; z-index:5; background:#1e1f22;
    display:flex; align-items:center; justify-content:space-between;
    gap:20px; flex-wrap:wrap; padding:14px 0 12px; margin-bottom:4px; }
  .header h1 { margin:0; }
  .searchbar { flex:0 0 auto; }
  #search { width:320px; max-width:100%; box-sizing:border-box; padding:10px 14px;
    font-size:15px; color:#e6e6e6; background:#2b2d31; border:1px solid #3a3c42;
    border-radius:10px; outline:none; }
  #search:focus { border-color:#5aa6ff; }
  #search::placeholder { color:#8a9098; }
  .hint { color:#8a9098; font-size:12px; margin:2px 2px 0; min-height:14px; }
  .nores { color:#c98a8a; padding:18px 2px; }
  .hidden { display:none !important; }
  /* header right-side controls */
  .header-right { display:flex; align-items:center; gap:12px; flex:0 0 auto; }
  .vh-btn { display:inline-flex; align-items:center; justify-content:center; cursor:pointer;
    width:42px; height:42px; color:#cdd2d8; background:#2b2d31;
    border:1px solid #3a3c42; border-radius:10px; }
  .vh-btn:hover { border-color:#5aa6ff; color:#fff; }
  .vh-btn svg { width:18px; height:18px; }
  /* left slide-in version-history panel */
  .vh-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:40;
    opacity:0; transition:opacity .2s ease; }
  .vh-overlay.is-open { opacity:1; }
  .vh-panel { position:fixed; top:0; left:0; bottom:0; width:min(560px,92vw);
    background:#1b1c1f; border-right:1px solid #34363b; z-index:41;
    transform:translateX(-100%); transition:transform .26s ease;
    display:flex; flex-direction:column; box-shadow:2px 0 24px rgba(0,0,0,.4); }
  .vh-panel.is-open { transform:translateX(0); }
  .vh-panel-head { display:flex; align-items:center; justify-content:space-between;
    padding:18px 22px; border-bottom:1px solid #34363b; flex:0 0 auto; }
  .vh-panel-head strong { font-size:17px; }
  .vh-close { cursor:pointer; background:none; border:none; color:#9aa0a6;
    font-size:24px; line-height:1; padding:2px 6px; border-radius:8px; }
  .vh-close:hover { background:#2b2d31; color:#fff; }
  .vh-body { overflow:auto; padding:8px 22px 28px; }
  .vh-body h2 { border-top:none; padding-top:0; margin-top:14px; font-size:15px; color:#9aa0a6; }
  .vh-body table { font-size:13px; }
  .vh-body th, .vh-body td { padding:7px 9px; }

  /* password gate */
  .gate { position:fixed; inset:0; z-index:100; background:#1e1f22;
    display:flex; align-items:center; justify-content:center; }
  .gate-card { width:min(360px,90vw); background:#26282c; border:1px solid #34363b;
    border-radius:14px; padding:28px 26px; box-shadow:0 12px 40px rgba(0,0,0,.45); }
  .gate-card h2 { margin:0 0 6px; font-size:18px; border:none; padding:0; }
  .gate-card p { margin:0 0 18px; color:#9aa0a6; font-size:13px; line-height:1.5; }
  .gate-card input { width:100%; box-sizing:border-box; padding:11px 14px; font-size:15px;
    color:#e6e6e6; background:#2b2d31; border:1px solid #3a3c42; border-radius:10px; outline:none; }
  .gate-card input:focus { border-color:#5aa6ff; }
  .gate-card button { margin-top:14px; width:100%; padding:11px; font-size:15px; cursor:pointer;
    color:#fff; background:#3b6fd4; border:none; border-radius:10px; font-weight:600; }
  .gate-card button:hover { background:#5aa6ff; }
  .gate-err { color:#e08a8a; font-size:13px; min-height:16px; margin-top:10px; text-align:center; }
</style>
</head>
<body>
<div class="gate" id="gate">
  <form class="gate-card" id="pw-form">
    <h2>Protected registry</h2>
    <p>Enter the password to view the Hosted Pages Registry.</p>
    <input id="pw" type="password" autocomplete="current-password" placeholder="Password" autofocus>
    <button type="submit">Unlock</button>
    <div class="gate-err" id="pw-err"></div>
  </form>
</div>
<div class="wrap">
  <div class="header">
    <h1 id="title">Hosted Pages Registry</h1>
    <div class="header-right">
      <button id="vh-btn" class="vh-btn hidden" type="button" aria-haspopup="dialog"
        aria-label="Version history" title="Version history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/>
        </svg>
      </button>
      <div class="searchbar">
        <input id="search" type="search" autocomplete="off" spellcheck="false"
          placeholder="Search pages, repos or links…">
      </div>
    </div>
  </div>
  <div class="hint" id="hint"></div>
  <div id="content">Loading…</div>
</div>

<div id="vh-overlay" class="vh-overlay hidden" aria-hidden="true"></div>
<aside id="vh-panel" class="vh-panel" role="dialog" aria-label="Version history" aria-hidden="true">
  <div class="vh-panel-head">
    <strong>Version history</strong>
    <button id="vh-close" class="vh-close" type="button" aria-label="Close">&times;</button>
  </div>
  <div class="vh-body" id="vh-body"></div>
</aside>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  let md = '';
  const el = document.getElementById('content');
  function setupSearch() {
    const input = document.getElementById('search');
    const hint = document.getElementById('hint');
    if (!input) return;
    // Group rendered nodes by section (each <h2> starts a new section).
    const groups = [];
    let cur = null;
    Array.from(el.children).forEach(node => {
      if (node.tagName === 'H2') { cur = { nodes: [node], tables: [] }; groups.push(cur); }
      else if (cur) { cur.nodes.push(node); if (node.tagName === 'TABLE') cur.tables.push(node); }
    });

    let noRes = document.createElement('div');
    noRes.className = 'nores hidden';
    noRes.textContent = 'No matches.';
    el.appendChild(noRes);

    function apply(q) {
      q = q.trim().toLowerCase();
      let totalShown = 0;
      groups.forEach(g => {
        const headText = g.nodes[0].textContent.toLowerCase();
        let groupHits = 0;
        g.tables.forEach(t => {
          t.querySelectorAll('tbody tr').forEach(tr => {
            const hay = (tr.textContent + ' ' +
              Array.from(tr.querySelectorAll('a')).map(a => a.href).join(' ')).toLowerCase();
            const match = !q || hay.includes(q) || headText.includes(q);
            tr.classList.toggle('hidden', !match);
            if (match) groupHits++;
          });
        });
        const showGroup = !q || groupHits > 0 || headText.includes(q);
        g.nodes.forEach(n => n.classList.toggle('hidden', !showGroup));
        totalShown += groupHits;
      });
      noRes.classList.toggle('hidden', !(q && totalShown === 0));
      hint.textContent = q ? (totalShown + ' page' + (totalShown === 1 ? '' : 's') + ' match') : '';
    }

    input.addEventListener('input', () => apply(input.value));
    // Focus shortcut: "/" jumps to search.
    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement !== input) { e.preventDefault(); input.focus(); }
    });
    input.focus();
  }

  function setupVersionHistory() {
    const btn = document.getElementById('vh-btn');
    const panel = document.getElementById('vh-panel');
    const overlay = document.getElementById('vh-overlay');
    const body = document.getElementById('vh-body');
    const closeBtn = document.getElementById('vh-close');
    // Find the changelog section heading and move it + everything after it
    // (until the next H2 / end) out of the main flow and into the side panel.
    const h2s = Array.from(el.querySelectorAll('h2'));
    const head = h2s.find(h => /version history|changelog/i.test(h.textContent));
    if (!head) return;
    const moved = [];
    let n = head;
    while (n) {
      const next = n.nextElementSibling;
      if (n !== head && n.tagName === 'H2') break; // stop at the next section
      moved.push(n);
      n = next;
    }
    moved.forEach(node => body.appendChild(node));

    function open() {
      overlay.classList.remove('hidden');
      // force reflow so the transition runs even in backgrounded tabs
      void panel.offsetWidth;
      overlay.classList.add('is-open');
      panel.classList.add('is-open');
      panel.setAttribute('aria-hidden', 'false');
      overlay.setAttribute('aria-hidden', 'false');
    }
    function close() {
      overlay.classList.remove('is-open');
      panel.classList.remove('is-open');
      panel.setAttribute('aria-hidden', 'true');
      overlay.setAttribute('aria-hidden', 'true');
      setTimeout(() => overlay.classList.add('hidden'), 220);
    }
    btn.classList.remove('hidden');
    btn.addEventListener('click', open);
    closeBtn.addEventListener('click', close);
    overlay.addEventListener('click', close);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && panel.classList.contains('is-open')) close();
    });
  }

  function render() {
    if (window.marked) {
      el.innerHTML = marked.parse(md);
      // The page title is shown in the sticky header, so drop the first H1 here.
      const h1 = el.querySelector('h1');
      if (h1) { document.getElementById('title').textContent = h1.textContent; h1.remove(); }
      el.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
      // Move the changelog into the left "Version history" panel BEFORE search
      // groups the remaining sections.
      setupVersionHistory();
      setupSearch();
    } else {
      // Offline fallback: show the raw markdown in a readable block.
      const pre = document.createElement('pre');
      pre.style.whiteSpace = 'pre-wrap';
      pre.textContent = md;
      el.innerHTML = '';
      el.appendChild(pre);
    }
  }
  // --- password gate: decrypt the registry in-browser ---
  const enc = JSON.parse(document.getElementById('enc').textContent);
  const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  async function decryptWith(pw) {
    const mat = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64(enc.salt), iterations:enc.iterations, hash:'SHA-256' },
      mat, { name:'AES-GCM', length:256 }, false, ['decrypt']);
    const plain = await crypto.subtle.decrypt(
      { name:'AES-GCM', iv:b64(enc.iv) }, key, b64(enc.ct));
    return new TextDecoder().decode(plain);
  }
  (function gate() {
    const g = document.getElementById('gate');
    const form = document.getElementById('pw-form');
    const input = document.getElementById('pw');
    const err = document.getElementById('pw-err');
    form.addEventListener('submit', async e => {
      e.preventDefault();
      err.textContent = '';
      try {
        md = await decryptWith(input.value);
        g.remove();
        render();
      } catch (_) {
        err.textContent = 'Incorrect password.';
        input.select();
      }
    });
    input.focus();
  })();
</script>
