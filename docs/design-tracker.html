<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Design Tracker</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; background:#1e1f22; color:#e6e6e6;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.5; }
  a { color:#5aa6ff; text-decoration:none; } a:hover { text-decoration:underline; }
  .wrap { max-width:1200px; margin:0 auto; padding:22px 20px 64px; }
  .header { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  h1 { font-size:25px; margin:0; }
  .sub { color:#9aa0a6; font-size:13px; margin:2px 0 16px; }
  .sub a { color:#9aa0a6; text-decoration:underline; }
  .controls { display:flex; gap:8px; flex:0 0 auto; flex-wrap:wrap; align-items:center; }
  input, select, textarea, button { font-family:inherit; }
  #search, .flt { height:36px; padding:0 11px; font-size:13.5px; color:#e6e6e6; background:#2b2d31; border:1px solid #3a3c42; border-radius:9px; outline:none; }
  #search { width:200px; max-width:100%; }
  #search:focus, .flt:focus { border-color:#5aa6ff; }
  .btn { height:36px; padding:0 13px; font-size:13px; font-weight:600; color:#cdd2d8; background:#2b2d31; border:1px solid #3a3c42; border-radius:9px; cursor:pointer; }
  .btn:hover { border-color:#5aa6ff; color:#fff; }
  .btn-primary { background:#2684FF; color:#fff; border-color:#2684FF; }
  .btn-primary:hover { background:#1a6fe0; }
  /* list */
  .list { display:flex; flex-direction:column; gap:7px; }
  .lhead, .lrow { display:grid; grid-template-columns:46px minmax(0,1fr) 150px 150px 52px 92px; gap:14px; align-items:center; }
  .lhead { padding:4px 14px 6px; font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:#7f868f; }
  .lrow { background:#26282c; border:1px solid #34363b; border-radius:11px; padding:11px 14px; cursor:pointer; }
  .lrow:hover { border-color:#4a4d55; }
  .t-title { font-size:14px; font-weight:700; color:#f0f1f3; }
  .t-notes { font-size:12px; color:#8a9098; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .t-link { font-size:11px; color:#5aa6ff; margin-top:3px; display:inline-block; }
  .pri { display:inline-flex; align-items:center; justify-content:center; min-width:30px; height:22px; padding:0 6px; border-radius:6px; font-size:11px; font-weight:800; }
  .pri.P0 { background:#3a2122; color:#ff8a80; border:1px solid #5e2f30; }
  .pri.P1 { background:#3a3020; color:#ffc46b; border:1px solid #5e4d2a; }
  .pri.P2 { background:#1f2b3d; color:#7db2ff; border:1px solid #2c456b; }
  .pri.P3 { background:#2b2d31; color:#9aa0a6; border:1px solid #3a3c42; }
  .pri.none { color:#5a616a; font-weight:600; }
  .st { display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; color:#cdd2d8; }
  .st-dot { width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .chip { font-size:11px; font-weight:600; color:#cdd2d8; background:#2b2d31; border-radius:100px; padding:2px 9px; justify-self:start; }
  .ver { font-size:11px; font-weight:700; color:#cdd2d8; background:#2b2d31; border:1px solid #3a3c42; border-radius:6px; padding:1px 7px; justify-self:start; }
  .upd { font-size:11.5px; color:#7f868f; }
  .nores { display:none; color:#c98a8a; padding:18px 4px; }
  /* editor drawer */
  .ov { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50; display:none; }
  .ov.open { display:block; }
  .drawer { position:fixed; top:0; right:0; bottom:0; width:min(440px,94vw); background:#1b1c1f; border-left:1px solid #34363b;
    z-index:51; transform:translateX(100%); transition:transform .24s ease; display:flex; flex-direction:column; box-shadow:-2px 0 26px rgba(0,0,0,.45); }
  .drawer.open { transform:translateX(0); }
  .drawer-head { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid #34363b; }
  .drawer-head strong { font-size:15px; }
  .drawer-body { overflow:auto; padding:16px 18px; flex:1; }
  .drawer-foot { display:flex; gap:10px; padding:14px 18px; border-top:1px solid #34363b; }
  .fld { margin-bottom:14px; }
  .fld label { display:block; font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:#8a9098; margin-bottom:6px; }
  .fld input, .fld select, .fld textarea { width:100%; padding:9px 11px; font-size:14px; color:#e6e6e6; background:#2b2d31; border:1px solid #3a3c42; border-radius:9px; outline:none; }
  .fld input:focus, .fld select:focus, .fld textarea:focus { border-color:#5aa6ff; }
  .fld textarea { min-height:150px; resize:vertical; line-height:1.5; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .x { cursor:pointer; background:none; border:none; color:#9aa0a6; font-size:22px; line-height:1; padding:2px 6px; border-radius:8px; }
  .x:hover { background:#2b2d31; color:#fff; }
  .del { margin-right:auto; color:#e08a8a; background:none; border:1px solid #4a3030; }
  .del:hover { background:#3a2626; color:#fff; border-color:#7a4040; }
  @media (max-width:820px){
    .lhead, .lrow { grid-template-columns:42px minmax(0,1fr) 120px; }
    .lhead .h-proj, .lhead .h-ver, .lhead .h-upd, .lrow .chip, .lrow .ver, .lrow .upd { display:none; }
  }
  /* chat assistant */
  .fab { position:fixed; right:24px; bottom:24px; z-index:60; width:56px; height:56px; border-radius:50%;
    background:#2684FF; color:#fff; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 22px rgba(0,0,0,.45); transition:transform .2s ease, background .2s ease; }
  .fab:hover { background:#1a6fe0; transform:translateY(-1px); }
  .fab svg { width:26px; height:26px; transition:transform .25s ease; }
  .fab.open svg { transform:rotate(45deg); }
  .chat { position:fixed; right:24px; bottom:92px; z-index:60; width:min(380px,calc(100vw - 32px)); height:min(540px,calc(100vh - 130px));
    background:#1b1c1f; border:1px solid #34363b; border-radius:16px; box-shadow:0 14px 40px rgba(0,0,0,.5);
    display:flex; flex-direction:column; overflow:hidden; opacity:0; transform:translateY(12px) scale(.98); pointer-events:none; transition:opacity .2s ease, transform .2s ease; }
  .chat.open { opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .chat-head { display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid #34363b; }
  .chat-head .dot { width:9px; height:9px; border-radius:50%; background:#37c97a; box-shadow:0 0 0 3px rgba(55,201,122,.18); }
  .chat-head strong { font-size:14px; }
  .chat-head span { font-size:11.5px; color:#8a9098; }
  .chat-msgs { flex:1; overflow:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:88%; font-size:13.5px; line-height:1.5; padding:9px 12px; border-radius:13px; word-wrap:break-word; }
  .msg.bot { align-self:flex-start; background:#26282c; border:1px solid #34363b; border-bottom-left-radius:4px; }
  .msg.me { align-self:flex-end; background:#2684FF; color:#fff; border-bottom-right-radius:4px; }
  .msg a { color:#5aa6ff; } .msg.me a { color:#dbe9ff; }
  .msg ul { margin:6px 0 2px; padding-left:18px; } .msg li { margin:2px 0; }
  .msg .mp { display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:18px; padding:0 5px; border-radius:5px; font-size:10px; font-weight:800; margin-right:4px; }
  .msg .mp.P0{background:#3a2122;color:#ff8a80} .msg .mp.P1{background:#3a3020;color:#ffc46b} .msg .mp.P2{background:#1f2b3d;color:#7db2ff} .msg .mp.P3{background:#2b2d31;color:#9aa0a6}
  .chips { display:flex; flex-wrap:wrap; gap:6px; padding:0 14px 10px; }
  .qchip { font-size:11.5px; color:#cdd2d8; background:#26282c; border:1px solid #34363b; border-radius:100px; padding:4px 10px; cursor:pointer; }
  .qchip:hover { border-color:#5aa6ff; color:#fff; }
  .chat-in { display:flex; gap:8px; padding:12px 14px; border-top:1px solid #34363b; align-items:flex-end; }
  .chat-in textarea { flex:1; min-height:40px; max-height:140px; padding:9px 13px; font-size:13.5px; line-height:1.45; color:#e6e6e6; background:#26282c; border:1px solid #34363b; border-radius:10px; outline:none; resize:none; overflow-y:auto; }
  .chat-in textarea:focus { border-color:#5aa6ff; }
  .chat-in button { height:40px; width:44px; flex:0 0 auto; border:none; border-radius:10px; background:#2684FF; color:#fff; cursor:pointer; }
  .chat-in button:hover { background:#1a6fe0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1 id="title">Design Tracker</h1>
    <div class="controls">
      <select class="flt" id="proj"><option value="">All projects</option></select>
      <select class="flt" id="fstatus"><option value="">All status</option></select>
      <select class="flt" id="fpri"><option value="">All priority</option><option>P0</option><option>P1</option><option>P2</option><option>P3</option></select>
      <input id="search" type="search" autocomplete="off" spellcheck="false" placeholder="Search…">
      <button class="btn" id="export" title="Download a snapshot (DESIGN-TRACKER.md) to commit/share">Export</button>
      <button class="btn" id="reset" title="Discard local edits, reload the published seed">Reset</button>
    </div>
  </div>
  <div class="sub" id="sub">Your working list · edits save in this browser · <strong>Hosted</strong> = shipped to the <a href="registry.html">registry</a>.</div>

  <div class="lhead">
    <span>Pri</span><span>Task</span><span class="h-proj">Project</span><span>Status</span><span class="h-ver">Ver</span><span class="h-upd">Updated</span>
  </div>
  <div class="list" id="list"></div>
  <div class="nores" id="nores">No matching tasks.</div>
</div>

<!-- editor drawer -->
<div class="ov" id="ov"></div>
<aside class="drawer" id="drawer" role="dialog" aria-label="Task">
  <div class="drawer-head"><strong id="d-head">Task</strong><button class="x" id="d-close">&times;</button></div>
  <div class="drawer-body">
    <div class="fld"><label>Title</label><input id="f-item" type="text" placeholder="Task title"></div>
    <div class="row2">
      <div class="fld"><label>Status</label><select id="f-status"></select></div>
      <div class="fld"><label>Priority</label><select id="f-pri"><option value="">—</option><option>P0</option><option>P1</option><option>P2</option><option>P3</option></select></div>
    </div>
    <div class="row2">
      <div class="fld"><label>Project</label><input id="f-project" list="projlist" placeholder="e.g. Client-freelancer"></div>
      <div class="fld"><label>Version</label><input id="f-version" type="text" placeholder="v0.1"></div>
    </div>
    <div class="fld"><label>Updated</label><input id="f-updated" type="text" placeholder="YYYY-MM-DD"></div>
    <div class="fld"><label>Link (Figma / preview / src)</label><input id="f-link" type="text" placeholder="https://…  or  [label](https://…)"></div>
    <div class="fld"><label>Notes</label><textarea id="f-notes" placeholder="Context, decisions, open questions, version log…"></textarea></div>
    <datalist id="projlist"></datalist>
  </div>
  <div class="drawer-foot">
    <button class="btn del" id="d-del">Delete</button>
    <button class="btn" id="d-cancel">Cancel</button>
    <button class="btn btn-primary" id="d-save">Save</button>
  </div>
</aside>

<!-- chat assistant -->
<div class="chat" id="chat" role="dialog" aria-label="Tracker assistant">
  <div class="chat-head"><span class="dot"></span><strong>Tracker assistant</strong><span id="chat-sub"></span></div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chips" id="chat-chips">
    <span class="qchip" data-q="What's P0?">What's P0?</span>
    <span class="qchip" data-q="Summary">Summary</span>
    <span class="qchip" data-q="Ready for handoff">Ready for handoff</span>
    <span class="qchip" data-q="Hosted pages">Hosted pages</span>
    <span class="qchip" data-q="add ">+ Add a task</span>
  </div>
  <div class="chat-in">
    <textarea id="chat-input" rows="1" autocomplete="off" placeholder="Ask, or paste a task list (one per line) to add them all"></textarea>
    <button id="chat-send" aria-label="Send"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a1 1 0 0 0-1.39 1.18L4.3 11.5 12 12l-7.7.5-2.29 6.72A1 1 0 0 0 3.4 20.4z"/></svg></button>
  </div>
</div>
<button class="fab" id="fab" aria-label="Open assistant" title="Tracker assistant">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<script id="md" type="text/plain">

| Workspace onboarding (5-step) | contractor-legal-ai | Ready for handoff | P1 | v1 | 2026-06-28 | [src](https://github.com/AnjuChorotiya/contractor-legal-ai/blob/dev/frontend/src/app/onboarding/workspace/page.tsx) | on dev; not yet in prod |

| Dev notes (annotations) | Wisemonk UI | Hosted |  | v1.5 | 2026-06-17 | [live](https://anjuchorotiya.github.io/Client-freelancer/wisemonk-ui/dev-notes.js) | shipped · drop-in on every project |
| Before/after-setup home + empty tabs | Client-freelancer | Hosted |  | v1 | 2026-06-17 | [live](https://anjuchorotiya.github.io/Client-freelancer/home.html?setup) | shipped · checklist, empty tabs, setup banner |
| EOR org + employee onboarding | wisemonk | Hosted |  | v1 | 2026-06-12 | [live](https://anjuchorotiya.github.io/wisemonk/) | shipped |
| contractor-legal-ai (app) | contractor-legal-ai | Hosted |  | v1 | 2026-06-28 | [live](https://legal.wisemonk.io) | shipped · live in production |
</script>

<script>
  const md = document.getElementById('md').textContent;
  const STORE = 'wm_design_tracker_v1';
  const STATUSES = ['To build','In design','In review','Ready for handoff','Hosted'];
  const STATUS_DOT = { 'To build':'#9aa0a6','In design':'#5aa6ff','In review':'#f0b132','Ready for handoff':'#3ad29f','Hosted':'#37c97a' };
  const PRI_ORDER = { 'P0':0,'P1':1,'P2':2,'P3':3,'':9 };
  const listEl = document.getElementById('list');
  let tasks = [], wired = false;

  function uid(){ return 't' + Math.random().toString(36).slice(2, 9); }
  function today(){ try { return new Date().toISOString().slice(0,10); } catch(e){ return ''; } }
  function esc(s){ return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  function parseSeed(text){
    const out = [];
    text.split(/\r?\n/).forEach(line => {
      line = line.trim();
      if (line[0] !== '|') return;
      const c = line.split('|').slice(1, -1).map(s => s.trim());
      if (c.length < 4 || /^:?-{2,}:?$/.test(c[0]) || c[0].toLowerCase() === 'item') return;
      out.push({ id: uid(), item: c[0], project: c[1]||'', status: STATUSES.includes(c[2]) ? c[2] : 'To build',
        priority: ['P0','P1','P2','P3'].includes(c[3]) ? c[3] : '', version: c[4]||'', updated: c[5]||'', link: c[6]||'', notes: c[7]||'' });
    });
    return out;
  }
  function load(){
    try { const s = localStorage.getItem(STORE); if (s) return JSON.parse(s).map(t => ({ priority:'', ...t })); } catch(e){}
    return parseSeed(md);
  }
  function persist(){ try { localStorage.setItem(STORE, JSON.stringify(tasks)); } catch(e){} }

  function linkHtml(cell){
    if (!cell) return '';
    let m = cell.match(/\[([^\]]+)\]\(([^)]+)\)/);
    let url = m ? m[2] : (/^https?:\/\//.test(cell) ? cell : '');
    if (!url) return '';
    return `<a class="t-link" href="${esc(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(m ? m[1] : 'open')} →</a>`;
  }

  function render(){ tasks = load(); if (!wired){ wireOnce(); wired = true; } draw(); }

  function draw(){
    const q = (document.getElementById('search').value || '').trim().toLowerCase();
    const pf = document.getElementById('proj').value;
    const sf = document.getElementById('fstatus').value;
    const prf = document.getElementById('fpri').value;

    // filter dropdown options
    const proj = document.getElementById('proj');
    const projects = [...new Set(tasks.map(t => t.project).filter(Boolean))].sort();
    proj.innerHTML = '<option value="">All projects</option>' + projects.map(p => `<option${p===pf?' selected':''}>${esc(p)}</option>`).join('');
    document.getElementById('projlist').innerHTML = projects.map(p => `<option value="${esc(p)}">`).join('');
    const fstatus = document.getElementById('fstatus');
    fstatus.innerHTML = '<option value="">All status</option>' + STATUSES.map(s => `<option${s===sf?' selected':''}>${s}</option>`).join('');

    const rows = tasks
      .filter(t => (!pf || t.project === pf) && (!sf || t.status === sf) && (!prf || t.priority === prf)
        && (!q || (t.item + ' ' + t.project + ' ' + t.notes).toLowerCase().includes(q)))
      .sort((a,b) => (PRI_ORDER[a.priority] - PRI_ORDER[b.priority])
        || (STATUSES.indexOf(a.status) - STATUSES.indexOf(b.status))
        || (b.updated || '').localeCompare(a.updated || ''));

    listEl.innerHTML = rows.map(rowHtml).join('');
    document.getElementById('nores').style.display = rows.length ? 'none' : 'block';
    document.getElementById('sub').innerHTML = `${tasks.length} tasks · edits save in this browser · <strong>Hosted</strong> = shipped to the <a href="registry.html">registry</a>.`;
    listEl.querySelectorAll('.lrow').forEach(r => r.addEventListener('click', () => openEditor(r.dataset.id)));
  }

  function rowHtml(t){
    const pr = t.priority ? `<span class="pri ${t.priority}">${t.priority}</span>` : `<span class="pri none">—</span>`;
    return `<div class="lrow" data-id="${t.id}">
      <span>${pr}</span>
      <span><div class="t-title">${esc(t.item) || '(untitled)'}</div>${t.notes ? `<div class="t-notes">${esc(t.notes)}</div>` : ''}${linkHtml(t.link)}</span>
      <span>${t.project ? `<span class="chip">${esc(t.project)}</span>` : ''}</span>
      <span class="st"><span class="st-dot" style="background:${STATUS_DOT[t.status]||'#9aa0a6'}"></span>${esc(t.status)}</span>
      <span>${t.version ? `<span class="ver">${esc(t.version)}</span>` : ''}</span>
      <span class="upd">${esc(t.updated)}</span>
    </div>`;
  }

  // ---- editor ----
  let editingId = null;
  function openEditor(id){
    const t = tasks.find(x => x.id === id); if (!t) return;
    editingId = id;
    document.getElementById('d-head').textContent = 'Edit task';
    document.getElementById('f-status').innerHTML = STATUSES.map(s => `<option${s===t.status?' selected':''}>${s}</option>`).join('');
    document.getElementById('f-item').value = t.item || '';
    document.getElementById('f-project').value = t.project || '';
    document.getElementById('f-pri').value = t.priority || '';
    document.getElementById('f-version').value = t.version || '';
    document.getElementById('f-updated').value = t.updated || '';
    document.getElementById('f-link').value = t.link || '';
    document.getElementById('f-notes').value = t.notes || '';
    document.getElementById('ov').classList.add('open');
    document.getElementById('drawer').classList.add('open');
    document.getElementById('f-item').focus();
  }
  function closeEditor(){ editingId = null; document.getElementById('ov').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }
  function saveEditor(){
    const t = tasks.find(x => x.id === editingId); if (!t) return;
    t.item = document.getElementById('f-item').value.trim();
    t.project = document.getElementById('f-project').value.trim();
    t.status = document.getElementById('f-status').value;
    t.priority = document.getElementById('f-pri').value;
    t.version = document.getElementById('f-version').value.trim();
    t.updated = document.getElementById('f-updated').value.trim() || today();
    t.link = document.getElementById('f-link').value.trim();
    t.notes = document.getElementById('f-notes').value.trim();
    persist(); closeEditor(); draw();
  }
  function deleteEditor(){ if (editingId && confirm('Delete this task?')) { tasks = tasks.filter(x => x.id !== editingId); persist(); closeEditor(); draw(); } }

  function exportMd(){
    let out = '# Design Tracker\n\n| Item | Project | Status | Priority | Version | Updated | Link | Notes |\n|---|---|---|---|---|---|---|---|\n';
    tasks.forEach(t => {
      const cells = [t.item, t.project, t.status, t.priority||'', t.version, t.updated, t.link, (t.notes||'').replace(/\n/g,' ')].map(c => (c||'').replace(/\|/g,'\\|'));
      out += '| ' + cells.join(' | ') + ' |\n';
    });
    const blob = new Blob([out], { type: 'text/markdown' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'DESIGN-TRACKER.md'; a.click(); URL.revokeObjectURL(a.href);
  }
  // ---- chat assistant (local, no backend) ----
  // Live repository knowledge base — the hosted projects this tracker feeds.
  const REPOS = [
    { name:'Wisemonk UI', what:'Universal design system (wm- classes, tokens, Iconsax, dev-notes)', url:'https://anjuchorotiya.github.io/Client-freelancer/wisemonk-ui/index.html' },
    { name:'wisemonk', what:'EOR org + employee onboarding (Next.js static export)', url:'https://anjuchorotiya.github.io/wisemonk/' },
    { name:'Client-freelancer', what:'Client + freelancer portal (home, workspace, invoices, payments)', url:'https://anjuchorotiya.github.io/Client-freelancer/home.html' },
    { name:'Admin-portal', what:'Internal admin tooling (Form 16, notifications, rules, usage)', url:'https://anjuchorotiya.github.io/Admin-portal/' },
    { name:'wisemonk-recruit-portal', what:'Recruiting flow', url:'https://anjuchorotiya.github.io/wisemonk-recruit-portal/' },
    { name:'client-balance', what:'Wallet / balance demo portal', url:'https://anjuchorotiya.github.io/client-balance/' },
    { name:'contractor-legal-ai', what:'Contractor compliance app (Next.js) — live in production', url:'https://legal.wisemonk.io' }
  ];
  const cmsgs = () => document.getElementById('chat-msgs');
  function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
  function addMsg(role, html){ const d = document.createElement('div'); d.className = 'msg ' + role; d.innerHTML = html; cmsgs().appendChild(d); cmsgs().scrollTop = cmsgs().scrollHeight; return d; }
  function priTag(p){ return p ? `<span class="mp ${p}">${p}</span>` : ''; }
  function taskLi(t){ const l = linkHtml(t.link).replace('t-link','') ; return `<li>${priTag(t.priority)}<strong>${esc(t.item)}</strong>${t.project?` · ${esc(t.project)}`:''}${t.status?` · ${esc(t.status)}`:''}</li>`; }
  function listMsg(title, arr){
    if (!arr.length) return addMsg('bot', pick([
      `Nothing under <strong>${esc(title)}</strong> right now — all clear there. 🎉`,
      `Hmm, nothing matches <strong>${esc(title)}</strong> at the moment.`,
      `Looks empty for <strong>${esc(title)}</strong>. Want to add something?`
    ]));
    const lead = pick([
      `Here's what's in <strong>${esc(title)}</strong> (${arr.length}):`,
      `You've got <strong>${arr.length}</strong> under ${esc(title)}:`,
      `Sure — ${esc(title)}, ${arr.length} item${arr.length === 1 ? '' : 's'}:`
    ]);
    return addMsg('bot', `${lead}<ul>${arr.map(taskLi).join('')}</ul>`);
  }

  function parseAdd(text){
    let s = text.replace(/^\s*(add|new|create|\+|todo)\b[:\-]?\s*/i, '').trim();
    let priority = 'P2', project = '', status = 'To build';
    const pm = s.match(/\bP([0-3])\b/i); if (pm){ priority = 'P' + pm[1]; s = s.replace(pm[0], ' '); }
    STATUSES.forEach(st => { const re = new RegExp('\\b' + st.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&') + '\\b', 'i'); if (re.test(s)){ status = st; s = s.replace(re, ' '); } });
    const projects = [...new Set([...tasks.map(t => t.project), ...REPOS.map(r => r.name)].filter(Boolean))];
    projects.sort((a,b) => b.length - a.length).forEach(p => { const re = new RegExp('(?:\\bfor|\\bin|\\bto|\\bon)?\\s*\\b' + p.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&') + '\\b', 'i'); if (!project && re.test(s)){ project = p; s = s.replace(re, ' '); } });
    s = s.replace(/\b(task|for|to|in|on|priority|status|project)\b/gi, ' ').replace(/\s{2,}/g, ' ').replace(/^[\s:,\-]+|[\s:,\-]+$/g, '').trim();
    return { item: s, priority, project, status };
  }
  function cleanLine(line){
    // strip bullets / numbering / checkboxes that come with pasted lists
    return line.replace(/^\s*(?:[-*•·]|\d+[.)]|\[[ xX]?\])\s+/, '').trim();
  }
  function addTaskFromChat(text){
    const p = parseAdd(text);
    if (!p.item){ addMsg('bot', pick([
      `Happy to — what's the task? Something like <em>“add P0 redesign invoices for Client-freelancer”</em>.`,
      `Sure thing. Just tell me the title (and a priority/project if you like) and I'll add it.`
    ])); return; }
    const t = { id: uid(), item: p.item, project: p.project, status: p.status, priority: p.priority, version: 'v0', updated: today(), link: '', notes: '' };
    tasks.unshift(t); persist(); draw();
    addMsg('bot', `${pick(['Done!','Got it 👍','Added 👍','Nice, that\'s in.','On the board!'])} ${priTag(p.priority)}<strong>${esc(p.item)}</strong> → <strong>${esc(p.status)}</strong>${p.project?` · ${esc(p.project)}`:''}. <a href="#" data-edit="${t.id}">Open to edit ↗</a>`);
  }
  function bulkAdd(text){
    const lines = text.split(/\r?\n/).map(cleanLine).filter(Boolean);
    if (!lines.length) return;
    if (lines.length === 1) return addTaskFromChat(lines[0]);
    const added = [];
    lines.forEach(line => {
      const p = parseAdd(line); if (!p.item) return;
      const t = { id: uid(), item: p.item, project: p.project, status: p.status, priority: p.priority, version: 'v0', updated: today(), link: '', notes: '' };
      tasks.unshift(t); added.push(t);
    });
    persist(); draw();
    const lead = pick([`Boom — added all <strong>${added.length}</strong>:`, `Done! Dropped <strong>${added.length}</strong> tasks on the board:`, `Got your list — <strong>${added.length}</strong> new tasks:`]);
    addMsg('bot', `${lead}<ul>${added.map(t => `<li>${priTag(t.priority)}${esc(t.item)}${t.project ? ` · ${esc(t.project)}` : ''} · ${esc(t.status)}</li>`).join('')}</ul>Click any row to fill in version, link or notes.`);
  }

  function summaryMsg(){
    const by = {}; STATUSES.forEach(s => by[s] = 0); tasks.forEach(t => by[t.status] = (by[t.status]||0) + 1);
    const pri = { P0:0, P1:0, P2:0, P3:0 }; tasks.forEach(t => { if (pri[t.priority] != null) pri[t.priority]++; });
    const lead = pick([`Here's where things stand — <strong>${tasks.length}</strong> tasks in all:`, `Quick rundown of all <strong>${tasks.length}</strong> tasks:`, `Sure! <strong>${tasks.length}</strong> tasks on the board:`]);
    const tail = pri.P0 ? `<br>${pri.P0} of those ${pri.P0 === 1 ? 'is' : 'are'} ${priTag('P0')}— probably worth a look first.` : '';
    addMsg('bot', `${lead}<ul>${STATUSES.map(s => `<li>${s}: <strong>${by[s]}</strong></li>`).join('')}</ul>By priority: ${['P0','P1','P2','P3'].map(p => `${priTag(p)}${pri[p]}`).join('  ')}${tail}`);
  }
  function reposMsg(){
    addMsg('bot', `${pick(['Here are the hosted projects this tracker feeds into:', 'Sure — these are the live projects:', 'Here\'s everything that\'s hosted:'])}<ul>${REPOS.map(r => `<li><a href="${r.url}" target="_blank" rel="noopener">${esc(r.name)}</a> — ${esc(r.what)}</li>`).join('')}</ul>Want the full index? It's in the <a href="registry.html">registry</a>.`);
  }
  function noMatchMsg(){
    addMsg('bot', pick([
      `Hmm, I didn't quite catch that. I'm best at <em>adding tasks</em>, filtering by <em>priority / status / project</em>, a quick <em>summary</em>, or listing <em>hosted pages</em>. Want me to add it as a task? Start with <em>“add …”</em>.`,
      `Not sure on that one. Try a keyword, ask for a <em>summary</em>, or say <em>“add …”</em> to make it a task. Type <em>help</em> for the full list.`
    ]));
  }
  function smalltalk(low){
    if (/\b(hi|hii|hey|hello|yo|howdy)\b/.test(low)) return addMsg('bot', pick([`Hey! 👋 What are we working on?`, `Hi there — what can I help you track?`, `Hey hey! Ask me anything, or paste some tasks to add.`])), true;
    if (/\b(thanks|thank you|thx|ty|cheers|nice|great|awesome|perfect|cool)\b/.test(low)) return addMsg('bot', pick([`Anytime! 🙌`, `You got it.`, `Glad to help — what's next?`, `👍 Happy to.`])), true;
    if (/\b(bye|see ya|later|goodnight|good night)\b/.test(low)) return addMsg('bot', pick([`Catch you later! 👋`, `See ya — I'll keep the board warm.`])), true;
    if (/^\s*(ok|okay|k|got it|sounds good|alright)\s*$/.test(low)) return addMsg('bot', pick([`👍`, `Cool.`, `On it whenever you are.`])), true;
    return false;
  }

  function botRespond(text){
    const q = text.trim(); if (!q) return;
    const low = q.toLowerCase();
    if (/^(add|new|create|\+|todo)\b/i.test(q)) return addTaskFromChat(q);
    if (/\b(help|what can you|how do|what do you)\b/.test(low))
      return addMsg('bot', `Happy to help! I keep tabs on everything in this tracker and the hosted repos. A few things you can ask:<ul><li><em>add P0 redesign invoices for Client-freelancer</em></li><li><strong>Paste a whole list</strong> (one task per line — Shift+Enter for a new line) and I'll create them all.</li><li><em>what's P0?</em> · <em>in review</em> · <em>ready for handoff</em> · <em>hosted</em></li><li><em>summary</em> · <em>hosted pages / links</em></li><li>or just type a keyword and I'll dig up matching tasks.</li></ul>`);
    if (smalltalk(low)) return;
    if (/\b(repo|repositor|hosted page|live (url|link|site)|links|pages|projects)\b/.test(low)) return reposMsg();
    if (/\b(summary|overview|how many|count|status|stats|where (are|do) (we|things))\b/.test(low)) return summaryMsg();
    const pm = low.match(/\bp([0-3])\b/); if (pm) return listMsg('Priority P' + pm[1], tasks.filter(t => t.priority === 'P' + pm[1]));
    for (const st of STATUSES){ if (low.includes(st.toLowerCase()) || (st === 'Ready for handoff' && /\bhandoff\b/.test(low))) return listMsg(st, tasks.filter(t => t.status === st)); }
    const proj = [...new Set(tasks.map(t => t.project).filter(Boolean))].find(p => low.includes(p.toLowerCase()));
    if (proj) return listMsg(proj, tasks.filter(t => t.project === proj));
    const hits = tasks.filter(t => (t.item + ' ' + t.project + ' ' + t.notes).toLowerCase().includes(low));
    if (hits.length) return listMsg('“' + q + '”', hits);
    return noMatchMsg();
  }
  function growInput(){ const i = document.getElementById('chat-input'); i.style.height = 'auto'; i.style.height = Math.min(i.scrollHeight, 140) + 'px'; }
  function sendChat(){
    const inp = document.getElementById('chat-input'); const v = inp.value.replace(/\s+$/,''); if (!v.trim()) return;
    inp.value = ''; growInput();
    const multi = /\r?\n/.test(v.trim());
    addMsg('me', esc(v).replace(/\r?\n/g, '<br>'));
    setTimeout(() => multi ? bulkAdd(v) : botRespond(v), 120);
  }
  let chatGreeted = false;
  function toggleChat(force){
    const c = document.getElementById('chat'), f = document.getElementById('fab');
    const open = force != null ? force : !c.classList.contains('open');
    c.classList.toggle('open', open); f.classList.toggle('open', open);
    f.setAttribute('aria-label', open ? 'Close assistant' : 'Open assistant');
    if (open){
      if (!chatGreeted){ addMsg('bot', `Hey! 👋 I'm your tracker buddy — I've got the full picture on all <strong>${tasks.length}</strong> tasks and the hosted projects. Ask me what's P0, get a quick summary, or just paste a list and I'll add it. What's up?`); chatGreeted = true; }
      document.getElementById('chat-sub').textContent = tasks.length + ' tasks';
      setTimeout(() => document.getElementById('chat-input').focus(), 200);
    }
  }

  function wireOnce(){
    ['search'].forEach(id => document.getElementById(id).addEventListener('input', draw));
    ['proj','fstatus','fpri'].forEach(id => document.getElementById(id).addEventListener('change', draw));
    document.getElementById('fab').addEventListener('click', () => toggleChat());
    document.getElementById('chat-send').addEventListener('click', sendChat);
    document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendChat(); } });
    document.getElementById('chat-input').addEventListener('input', growInput);
    document.getElementById('chat-chips').addEventListener('click', e => {
      const q = e.target.getAttribute && e.target.getAttribute('data-q'); if (q == null) return;
      const inp = document.getElementById('chat-input');
      if (q.trim().toLowerCase() === 'add'){ inp.value = 'add '; inp.focus(); }
      else { addMsg('me', esc(q)); setTimeout(() => botRespond(q), 120); }
    });
    cmsgs().addEventListener('click', e => {
      const id = e.target.getAttribute && e.target.getAttribute('data-edit');
      if (id){ e.preventDefault(); toggleChat(false); openEditor(id); }
    });
    document.getElementById('export').addEventListener('click', exportMd);
    document.getElementById('reset').addEventListener('click', () => { if (confirm('Discard local edits and reload the published list?')) { try { localStorage.removeItem(STORE); } catch(e){} tasks = parseSeed(md); persist(); draw(); } });
    document.getElementById('d-close').addEventListener('click', closeEditor);
    document.getElementById('d-cancel').addEventListener('click', closeEditor);
    document.getElementById('ov').addEventListener('click', closeEditor);
    document.getElementById('d-save').addEventListener('click', saveEditor);
    document.getElementById('d-del').addEventListener('click', deleteEditor);
    document.addEventListener('keydown', e => { if (e.key === 'Escape'){ closeEditor(); toggleChat(false); } });
  }

  if (document.getElementById("md")) render();
</script>
</body>
</html>
