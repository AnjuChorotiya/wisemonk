<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add people — Wisemonk</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-50: #E8F2FF;
      --primary-500: #2684FF;
      --primary-600: #1A6FE0;
      --neutral-0: #FFFFFF;
      --neutral-50: #F7F8FA;
      --bg-subtle: #F1F8FF;
      --border: #EEF0F4;
      --border-strong: #DDE1E9;
      --text-primary: #222733;
      --text-muted: #6B7588;
      --radius-lg: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Satoshi', sans-serif; background: var(--bg-subtle); color: var(--text-primary); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    /* Top bar */
    .topbar { display: flex; align-items: center; justify-content: space-between; height: 72px; padding: 0 40px; background: var(--neutral-0); border-bottom: 1px solid var(--border); }
    .topbar-logo { display: flex; align-items: center; height: 32px; overflow: hidden; }
    .topbar-logo img { height: 52px; width: auto; margin-top: -28px; }
    .help-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--primary-50); color: var(--primary-600); border: none; font-family: 'Satoshi', sans-serif; font-weight: 500; font-size: 14.5px; line-height: 1; padding: 11px 18px; border-radius: 100px; cursor: pointer; transition: background 0.15s; }
    .help-btn:hover { background: #DBE9FF; }
    .help-btn svg { width: 18px; height: 18px; }

    /* Content */
    .wrap { max-width: 940px; margin: 0 auto; padding: 32px 24px 80px; }
    .back-btn { display: inline-flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 500; color: var(--text-primary); margin-bottom: 20px; transition: opacity 0.15s; }
    .back-btn:hover { opacity: 0.7; }
    .back-btn svg { width: 22px; height: 22px; }
    .head { text-align: center; margin-bottom: 44px; }
    .head h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.4px; color: var(--text-primary); }
    .head p { margin-top: 10px; font-size: 16px; color: var(--text-muted); }

    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .option-card {
      background: var(--neutral-0); border: none; border-radius: var(--radius-lg);
      padding: 28px 28px 26px; display: flex; flex-direction: column;
      box-shadow: 0 1px 2px rgba(16,24,40,0.04);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .option-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(16,24,40,0.10); }
    .option-illus { height: 170px; display: flex; align-items: center; justify-content: center; margin-bottom: 22px; }
    .option-illus img { max-height: 100%; max-width: 70%; object-fit: contain; }
    .option-card h3 { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .option-card p { font-size: 14.5px; color: var(--text-muted); line-height: 1.5; }

    @media (max-width: 720px) {
      .options { grid-template-columns: 1fr; }
      .topbar { padding: 0 20px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a href="people.html" class="topbar-logo"><img src="wisemonk_logo_final.png" alt="Wisemonk"></a>
    <button class="help-btn"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9.25" stroke="currentColor" stroke-width="1.6"/><path d="M9.85 9.3a2.2 2.2 0 1 1 3.1 2.05c-.75.42-1 .82-1 1.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="16.4" r="0.95" fill="currentColor"/></svg>Need help?</button>
  </header>

  <main class="wrap">
    <a href="people.html" class="back-btn"><svg viewBox="0 0 24 24" fill="none"><path d="M9.57 5.93 3.5 12l6.07 6.07" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M20.5 12H3.67" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>Back</a>
    <div class="head">
      <h1>How would you like to invite?</h1>
      <p>Select how you want to add new team members.</p>
    </div>

    <div class="options">
      <a href="onboarding/employee/" class="option-card">
        <div class="option-illus"><img src="invite-employee.png" alt=""></div>
        <h3>An employee</h3>
        <p>Send an invite to a single new team member.</p>
      </a>
      <a href="#" class="option-card">
        <div class="option-illus"><img src="invite-contractor.png" alt=""></div>
        <h3>A contractor</h3>
        <p>Send an invite to a single new team member.</p>
      </a>
    </div>
  </main>

<!-- Dev notes drop-in -->
<script src="https://anjuchorotiya.github.io/Client-freelancer/wisemonk-ui/dev-notes.js"></script>
</body>
</html>
